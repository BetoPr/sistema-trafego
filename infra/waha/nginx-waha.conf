# Nginx vhost — waha.sonarcrm.com.br → container WAHA na porta 3001 (localhost).
# Path: /etc/nginx/sites-available/waha
# Ativar: ln -s /etc/nginx/sites-available/waha /etc/nginx/sites-enabled/waha
# SSL: certbot --nginx -d waha.sonarcrm.com.br

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name waha.sonarcrm.com.br;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name waha.sonarcrm.com.br;

    # SSL certs gerenciados pelo Certbot — preencher após rodar:
    # ssl_certificate     /etc/letsencrypt/live/waha.sonarcrm.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/waha.sonarcrm.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs separados
    access_log /var/log/nginx/waha.access.log;
    error_log  /var/log/nginx/waha.error.log;

    # Upload mídia grande (WhatsApp permite até 100MB)
    client_max_body_size 100M;

    # Proxy direto pro container WAHA
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (WAHA dashboard usa)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers padrão
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos (sessions iniciando demoram)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Sem buffer (importante pra streaming de eventos)
        proxy_buffering off;
    }
}
